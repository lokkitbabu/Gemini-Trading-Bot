# Alembic configuration file

[alembic]
# Path to migration scripts
script_location = prediction_arb/migrations

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `dateutil` to the `install_requires` of your
# setup.cfg
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory
# sourceless = false

# Version location specification; This defaults to migrations/versions.
# When using multiple version directories, initial revisions must be specified
# with --version-path.
# The path separator used here should be the separator specified by "version_path_separator"
# below.
# version_locations = %(here)s/bar:%(here)s/bat:prediction_arb/migrations/versions

# Version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. Note that this character is also used to split the directories in
# version_locations
# version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.
# version_path_separator = :   # Unix
# version_path_separator = ;   # Windows
# version_path_separator = space  # Space

# The output encoding used when revision files are written from script.mako
# output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://arb:arb@localhost:5432/arbdb


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
