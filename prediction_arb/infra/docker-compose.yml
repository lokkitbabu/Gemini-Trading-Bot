version: "3.9"

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  promdata:

services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: .env
    logging:
      driver: awslogs
      options:
        awslogs-group: /arb/bot
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream: bot
    depends_on:
      - postgres
    networks:
      - internal
    expose:
      - "8000"

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arb}
      POSTGRES_USER: ${POSTGRES_USER:-arb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
    expose:
      - "5432"

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - promdata:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - internal
    expose:
      - "9090"

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    networks:
      - internal
    expose:
      - "3000"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - bot
      - dashboard
    networks:
      - internal
